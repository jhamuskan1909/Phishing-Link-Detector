<!DOCTYPE html>
<html>
<head>
  <title>Phishing Link Detector</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 80px auto; background: #0f0f0f; color: white; }
    h1 { color: #e74c3c; }
    input { width: 100%; padding: 12px; font-size: 16px; border-radius: 8px; border: none; margin: 10px 0; }
    button { padding: 12px 30px; background: #e74c3c; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    #result { margin-top: 30px; padding: 20px; border-radius: 10px; font-size: 18px; display: none; }
    .safe { background: #1e3a1e; border: 1px solid #2ecc71; }
    .phishing { background: #3a1e1e; border: 1px solid #e74c3c; }
  </style>
</head>
<body>
  <h1>🛡️ Phishing Link Detector</h1>
  <p>Enter a URL to check if it's safe or phishing</p>
  <input type="text" id="urlInput" placeholder="https://example.com" />
  <button onclick="checkURL()">Scan URL</button>
  <div id="result"></div>

  <script>
    async function checkURL() {
      const url = document.getElementById('urlInput').value;
      const res = await fetch('/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: url })
      });
      const data = await res.json();
      const resultDiv = document.getElementById('result');
      resultDiv.style.display = 'block';
      if (data.prediction === 1) {
        resultDiv.className = 'phishing';
        resultDiv.innerHTML = '🚨 PHISHING DETECTED! Risk: ' + data.probability + '%';
      } else {
        resultDiv.className = 'safe';
        resultDiv.innerHTML = '✅ SAFE URL! Risk: ' + data.probability + '%';
      }
    }
  </script>
</body>
</html>

<p style="text-align:center; color:gray; margin-top:50px; font-size:13px;">
